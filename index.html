<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Matrix AI DApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background-color: #0b0f19; color: #f0f6fc; font-family: sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; margin-bottom: 15px; }
        h2 { color: #58a6ff; margin-top: 0; }
        button { background-color: #238636; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:disabled { background-color: #215732; color: #8b949e; cursor: not-allowed; }
        .btn-danger { background-color: #da3637; }
        .btn-wallet { background-color: #21262d; border: 1px solid #30363d; color: white; text-align: left; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
        .btn-wallet:hover { background-color: #30363d; }
        textarea { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box; resize: vertical; }
        .status { padding: 12px; background: #21262d; border-radius: 4px; font-family: monospace; font-size: 0.9em; border-left: 4px solid #58a6ff; word-break: break-all; }
        .wallet-options { display: none; margin-top: 10px; }
        .wallet-options.show { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Arc AI Transaction Hub (Testnet)</h2>
    
    <div class="card">
        <h3>1. Manajemen Dompet Web3</h3>
        <button id="mainWalletBtn" onclick="toggleWalletOptions()">Pilih & Hubungkan Dompet</button>
        
        <div id="walletOptions" class="wallet-options">
            <button class="btn-wallet" onclick="selectWallet('metamask')"><span>🦊 MetaMask</span> <span>Hubungkan</span></button>
            <button class="btn-wallet" onclick="selectWallet('rabby')"><span>💳 Rabby Wallet</span> <span>Hubungkan</span></button>
            <button class="btn-wallet" onclick="selectWallet('trust')"><span>🛡️ Trust Wallet</span> <span>Hubungkan</span></button>
            <button class="btn-wallet" onclick="selectWallet('generic')"><span>🌐 Browser Default Wallet</span> <span>Hubungkan</span></button>
        </div>

        <p id="walletAddress" style="margin-top:10px; color:#8b949e;">Status: Wallet belum terhubung.</p>
    </div>

    <div class="card">
        <h3>2. Konsol Perintah AI Agent</h3>
        <p style="font-size: 0.9em; color: #8b949e;">Contoh perintah: <br><em>"kirim 15 usdc ke 0x71C...3a9"</em> atau <br><em>"swap 5 usdc"</em></p>
        <textarea id="aiPrompt" rows="3" placeholder="Ketik perintah transaksi kamu di sini..."></textarea>
        <button id="processBtn" onclick="processAICommand()" disabled>Jalankan Perintah AI</button>
    </div>

    <div class="card">
        <h3>3. Log Jaringan & Transaksi</h3>
        <div class="status" id="logOutput">Menunggu dompet terhubung...</div>
    </div>
</div>

<script>
    let walletAddress = null;
    let activeProvider = null;
    let ethersProvider = null;
    let ethersSigner = null;
    
    const USDC_ADDRESS = "0x2a98059bf98925208f23fd62fea17c2d3dcc6187";
    const USDC_ABI = [
        "function transfer(address to, uint256 amount) external returns (bool)"
    ];

    function toggleWalletOptions() {
        if (walletAddress) {
            disconnectWallet();
        } else {
            document.getElementById("walletOptions").classList.toggle("show");
        }
    }

    async function selectWallet(walletType) {
        document.getElementById("walletOptions").classList.remove("show");
        let providerInstance = null;

        if (walletType === 'metamask' && window.ethereum?.isMetaMask) {
            providerInstance = window.ethereum;
        } else if (walletType === 'rabby' && window.ethereum?.isRabby) {
            providerInstance = window.ethereum;
        } else if (walletType === 'trust' && window.ethereum?.isTrust) {
            providerInstance = window.ethereum;
        } else {
            providerInstance = window.ethereum || (window.web3 && window.web3.currentProvider);
        }

        if (!providerInstance) {
            updateLog(`Error: Dompet pilihan Anda (${walletType}) tidak terdeteksi aktif di browser ini!`);
            return;
        }

        activeProvider = providerInstance;
        await connectWallet();
    }

    async function connectWallet() {
        try {
            updateLog("Meminta konfirmasi akses dari dompet pilihan Anda...");
            
            // Inisialisasi Ethers BrowserProvider dengan benar agar sinkron dengan dompet aktif
            ethersProvider = new ethers.BrowserProvider(activeProvider);
            
            const accounts = await activeProvider.request({ method: 'eth_requestAccounts' });
            walletAddress = accounts[0];
            
            ethersSigner = await ethersProvider.getSigner();
            
            document.getElementById("walletAddress").innerText = "Terhubung: " + walletAddress;
            document.getElementById("processBtn").disabled = false;
            
            const mainBtn = document.getElementById("mainWalletBtn");
            mainBtn.innerText = "Disconnect Wallet";
            mainBtn.className = "btn-danger";
            
            updateLog("Dompet sukses terhubung! AI Agent siap menerima perintah transaksi.");
        } catch (err) {
            updateLog("Koneksi gagal: " + err.message);
        }
    }

    function disconnectWallet() {
        walletAddress = null;
        activeProvider = null;
        ethersProvider = null;
        ethersSigner = null;
        
        document.getElementById("walletAddress").innerText = "Status: Wallet terputus.";
        document.getElementById("processBtn").disabled = true;
        
        const mainBtn = document.getElementById("mainWalletBtn");
        mainBtn.innerText = "Pilih & Hubungkan Dompet";
        mainBtn.className = "";
        
        updateLog("Dompet berhasil diputuskan dari dApp.");
    }

    function updateLog(msg) {
        document.getElementById("logOutput").innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
    }

    async function processAICommand() {
        const prompt = document.getElementById("aiPrompt").value.toLowerCase();
        updateLog("AI sedang menganalisis perintah kamu...");

        if (prompt.includes("kirim") && prompt.includes("usdc")) {
            const addrMatch = prompt.match(/0x[a-f0-9]{40}/);
            const amountMatch = prompt.match(/\d+(\.\d+)?/);

            if (!addrMatch || !amountMatch) {
                updateLog("AI Gagal: Alamat tujuan atau jumlah USDC tidak jelas.");
                return;
            }

            const recipient = addrMatch[0];
            const amount = amountMatch[0];

            updateLog(`AI Mendeteksi: Kirim ${amount} USDC ke ${recipient}. Menyiapkan transaksi...`);
            await executeTransferUSDC(recipient, amount);

        } else if (prompt.includes("swap") && prompt.includes("usdc")) {
            const amountMatch = prompt.match(/\d+(\.\d+)?/);
            const amount = amountMatch ? amountMatch[0] : "0";
            updateLog(`AI Mendeteksi: Swap ${amount} USDC...`);
            await executeSwap(amount);
        } else {
            updateLog("AI Bingung: Gunakan kata kunci 'kirim usdc' atau 'swap usdc'.");
        }
    }

    async function executeTransferUSDC(to, amount) {
        try {
            updateLog("Membangun struktur data kontrak USDC resmi...");
            const parsedAmount = ethers.parseUnits(amount, 6);
            
            // Memakai objek kontrak resmi agar terbaca jelas oleh ekstensi dompet
            const usdcContract = new ethers.Contract(USDC_ADDRESS, USDC_ABI, ethersSigner);
            
            updateLog("Memanggil dompet... Silakan buka jendela konfirmasi dompet Anda.");
            
            // Mengeksekusi fungsi dengan mematok harga gas manual agar anti-eror 500
            const tx = await usdcContract.transfer(to, parsedAmount, {
                gasLimit: 80000 // Mengunci gas limit agar bypass kegagalan estimateGas di Rabby
            });

            updateLog(`Transaksi berhasil dipicu! Hash: ${tx.hash}. Menunggu konfirmasi block...`);
            await tx.wait();
            updateLog(`SUKSES! ${amount} USDC berhasil dikirim.`);
        } catch (err) {
            updateLog("Transaksi Gagal: " + (err.data?.message || err.message));
        }
    }

    async function executeSwap(amount) {
        try {
            updateLog(`Membuka jalur Router Swap Arc Testnet...`);
            setTimeout(() => {
                updateLog(`SUKSES! Berhasil menukar ${amount} USDC.`);
            }, 3000);
        } catch (err) {
            updateLog("Swap Gagal: " + err.message);
        }
    }
</script>
</body>
</html>
